<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Navy Games</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              'bg-deep': '#0B0D11',
              'card-bg': '#15181E',
              'brand-blue': '#3B82F6',
            },
          },
        },
      };
    </script>
    <style>
      body { background-color: #0B0D11; color: #E2E8F0; font-family: 'Inter', sans-serif; }
      .game-card {
        background: #15181E;
        border: 1px solid rgba(255, 255, 255, 0.03);
        transition: transform 0.2s ease, border-color 0.2s ease;
      }
      .game-card:hover { transform: translateY(-3px); border-color: rgba(59, 130, 246, 0.3); }
      
      /* Dokunmatik ekranlar için aktifleşme efekti */
      @media (hover: none) {
        .game-card:active { transform: scale(0.98); }
      }
    </style>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="selection:bg-brand-blue/30 overflow-x-hidden">

    <nav class="max-w-6xl mx-auto p-6 md:p-8">
        <a href="https://navygamestudio.com" class="text-lg md:text-xl font-extrabold tracking-tighter opacity-90 hover:opacity-100 transition-opacity">
            NAVY GAMES
        </a>
    </nav>

    <main class="max-w-4xl mx-auto px-6">
        
        <section class="py-12 md:py-20 text-center">
            <h1 class="text-3xl md:text-5xl font-extrabold mb-4 md:mb-6 tracking-tight text-white leading-tight">
                Mobile Games
            </h1>
            <p class="text-slate-400 text-base md:text-lg mb-8 md:mb-10 max-w-xl mx-auto leading-relaxed">
                We develop & publish mobile games that you'll love to play.
            </p>
            
            <div class="flex justify-center">
                <a href="mailto:info@navygamestudio.com" class="group relative inline-flex items-center gap-3 px-8 md:px-10 py-3 md:py-4 bg-white text-black font-bold rounded-xl md:rounded-2xl hover:bg-brand-blue hover:text-white transition-all duration-300 shadow-xl">
                    <i data-lucide="mail" class="w-5 h-5"></i>
                    Contact Us
                </a>
            </div>
        </section>

        <section class="py-8 md:py-12">
            <div class="flex items-center gap-4 md:gap-6 mb-8 md:mb-12">
                <div class="h-[1px] flex-grow bg-white/5"></div>
                <h2 class="text-lg md:text-xl font-bold text-white/80 whitespace-nowrap">Our Games</h2>
                <div class="h-[1px] flex-grow bg-white/5"></div>
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 md:gap-6">
                
                <div class="game-card rounded-2xl p-5 md:p-6 flex items-center gap-4 md:gap-5">
                    <img src="https://is1-ssl.mzstatic.com/image/thumb/Purple221/v4/bd/a9/e2/bda9e21e-6584-57b3-f195-6b6713833ba9/AppIcon-0-0-1x_U007emarketing-0-8-0-85-220.png/460x0w.webp" 
                         alt="Hexa" class="w-16 h-16 md:w-20 md:h-20 rounded-xl shadow-lg" />
                    <div class="flex-grow min-w-0">
                        <h3 class="font-bold text-base md:text-lg text-white truncate">Hexa: Color Chaos!</h3>
                        <p class="text-[10px] md:text-xs text-slate-500 mb-2 md:mb-3 uppercase tracking-wider">Casual & Puzzle</p>
                        <a href="https://apps.apple.com/us/app/hexa-color-chaos/id6746575729" target="_blank" class="text-xs font-semibold text-brand-blue hover:text-blue-400 transition-colors inline-flex items-center gap-1">
                            App Store <i data-lucide="arrow-right" class="w-3 h-3"></i>
                        </a>
                    </div>
                </div>

                <div class="game-card rounded-2xl p-5 md:p-6 flex items-center gap-4 md:gap-5">
                    <img src="https://is1-ssl.mzstatic.com/image/thumb/Purple211/v4/62/73/00/627300bf-ddf0-cb15-5a47-76573d07d834/AppIcon-0-0-1x_U007emarketing-0-8-0-85-220.png/460x0w.webp" 
                         alt="Pixel Gun" class="w-16 h-16 md:w-20 md:h-20 rounded-xl shadow-lg" />
                    <div class="flex-grow min-w-0">
                        <h3 class="font-bold text-base md:text-lg text-white truncate">Pixel Gun Tycoon</h3>
                        <p class="text-[10px] md:text-xs text-slate-500 mb-2 md:mb-3 uppercase tracking-wider">Simulation & Strategy</p>
                        <div class="flex flex-wrap gap-x-4 gap-y-2">
                            <a href="https://apps.apple.com/us/app/pixel-gun-tycoon/id6748413108" target="_blank" class="text-xs font-semibold text-brand-blue hover:text-blue-400 transition-colors inline-flex items-center gap-1">
                                App Store <i data-lucide="arrow-right" class="w-3 h-3"></i>
                            </a>
                            <a href="https://play.google.com/store/apps/details?id=com.navygamestudio.guntycoon&hl=en" target="_blank" class="text-xs font-semibold text-brand-blue hover:text-blue-400 transition-colors inline-flex items-center gap-1">
                                Play Store <i data-lucide="arrow-right" class="w-3 h-3"></i>
                            </a>
                        </div>
                    </div>
                </div>

            </div>
        </section>

    </main>

    <footer class="mt-12 md:mt-20 py-8 md:py-10 border-t border-white/5 text-center px-6">
        <p class="text-[10px] md:text-xs text-slate-600 mb-4 tracking-wide uppercase">© 2026 Navy Games LTD. STI.</p>
        <div class="flex justify-center gap-6">
            <a href="./privacypolicy.html" class="text-xs text-slate-500 hover:text-white transition-colors">Privacy Policy</a>
            <a href="./termsofuse.html" class="text-xs text-slate-500 hover:text-white transition-colors">Terms of Use</a>
        </div>
    </footer>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
